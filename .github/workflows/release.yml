name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: UI Studio ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## UI Studio ${{ github.ref_name }}

            Real-time collaborative design canvas built with Next.js, Fabric.js, and Liveblocks.

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for curated release notes.
